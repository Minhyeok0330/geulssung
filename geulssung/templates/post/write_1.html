{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>글쓰기 ✍️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang&display=swap');
    body { font-family: 'Gowun Batang', serif; }
  </style>
</head>
<body class="bg-[#FFF9F2] min-h-screen p-8">

  <div class="w-full max-w-5xl mx-auto px-4 py-6 bg-white rounded-xl shadow-md">

    
<!-- 스타일 -->
 <style>
  /* ✅ 1단계: 캐릭터 선택용 이미지 라디오 버튼 정렬 및 스타일 */
  .radio-wrapper {
    display: flex;
    gap: 60px;
    justify-content: center;
  }

  label.radio-block {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input[type="radio"] {
    margin-bottom: 10px;
  }

  .image-label {
    cursor: pointer;
    transition: transform 0.2s;
  }

  /* ✅ 2단계: 장르 선택 버튼 기본 스타일 */
  .genre-btn {
    display: inline-block;
    padding: 0.5rem 1.25rem;
    margin: 0 0.5rem;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    background-color: #fdfdfd;
    transition: all 0.2s ease;
    color: #333;
    text-align: center;
  }

  /* ✅ 마우스 오버 시 장르 버튼 스타일 변경 */
  .genre-btn:hover {
    background-color: #f5f5f5;
    border-color: #bbb;
  }

  /* ✅ 선택된 장르 버튼에 강조 효과 */
  input[type="radio"]:checked + label.genre-btn {
    background-color: #fbeedc;
    border-color: #493E3E;
    color: #493E3E;
  }

  /* ✅ 포커스 시(선택했을 때) 커서 테두리 제거 → 깔끔한 버튼 느낌 */
  .genre-btn:focus {
    outline: none;
    box-shadow: none;
  }

  /* ✅ peer 클래스를 사용할 경우에도 포커스 제거 적용 (접근성 고려한 확장 대응) */
  input[type="radio"].peer:focus + label.genre-btn {
    outline: none;
    box-shadow: none;
  }

  /* ✅ step */
.step-btn {
  padding: 0.5rem 1rem;
  border-radius: 0.5rem;
  border: 2px solid #ccc;
  background-color: #fff;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

/* 현재 진행 중인 단계 */
.step-current {
  background-color: #FFE8CC;
  border-color: #FF9800;
  color: #BF360C;
}

.step-btn:hover {
  opacity: 0.70;
}
</style>


<!-- 0단계: 현 스텝 이미지 표현 -->
<div id="step-nav" class="mb-10 flex flex-wrap justify-center gap-2 text-sm md:text-base">

  <button onclick="moveToStep(1)" class="step-btn step-default" id="step-1">1. 🤔💭</button>
  <button onclick="moveToStep(2)" class="step-btn step-default" id="step-2">2. 💧</button>
  <button onclick="moveToStep(3)" class="step-btn step-default" id="step-3">3. 💧💧</button>
  <button onclick="moveToStep(4)" class="step-btn step-default" id="step-4">4. 💧💧💧</button>
  <button onclick="moveToStep(5)" class="step-btn step-default" id="step-5">5. ✍🏻</button>

</div>


<!-- 1단계: 글썽이/말썽이 선택 -->
<div class="mb-8">
  <p class="font-semibold text-[#493E3E] text-center">오늘의 글쓰기 도우미</p>
</div>
<div class="mb-8">
  <div class="radio-wrapper">
    
    <!-- 글썽이 -->
    <label class="radio-block">
      <input type="radio" name="category" value="emotion" onchange="showGenres(this.value)">
      <img class="w-[250px]" src="{% static 'image/geulssung.png' %}" alt="F감성 글썽이" class="image-label image-option">
    </label>

    <!-- 말썽이 -->
    <label class="radio-block">
      <input type="radio" name="category" value="logic" onchange="showGenres(this.value)">
      <img class="w-[175px]" src="{% static 'image/malssung.png' %}" alt="T감성 말썽이" class="image-label w-[150px]">
    </label>

  </div>
</div>



<!-- 2단계: 하위 장르 -->
<div class="mb-14" id="genre-emotion" style="display:none;">
  <p class="text-center font-semibold text-[#493E3E] mb-4">형식을 골라보세요 (글썽이)</p>
  <div class="flex justify-center gap-4">
    <!-- 버튼처럼 보이는 라디오 버튼 -->
    <input type="radio" name="genre" value="essay" id="genre-essay" class="hidden peer" onchange="articleSource(this.value)">
    <label for="genre-essay" class="genre-btn">에세이</label>
    <input type="radio" name="genre" value="poem" id="genre-poem" class="hidden peer" onchange="articleSource(this.value)">
    <label for="genre-poem" class="genre-btn">시</label>
  </div>
</div>
<div class="mb-14" id="genre-logic" style="display:none;">
  <p class="text-center font-semibold text-[#493E3E] mb-4">형식을 골라보세요 (말썽이)</p>
  <div class="flex justify-center gap-4">
    <input type="radio" name="genre" value="column" id="genre-column" class="hidden peer" onchange="articleSource(this.value)">
    <label for="genre-column" class="genre-btn">칼럼</label>
    <input type="radio" name="genre" value="analysis" id="genre-analysis" class="hidden peer" onchange="articleSource(this.value)">
    <label for="genre-analysis" class="genre-btn">분석글</label>
  </div>
</div>

 <!-- js 모듈 불러오기 -->

<script type="module">
  import { showGenres } from "{% static 'js/categoryHandler.js' %}";
  window.showGenres = showGenres;
  import { articleSource } from "{% static 'js/genreHandler.js' %}";
